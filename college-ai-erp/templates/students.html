<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
</head>
<body>

<h1>Students</h1>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Attendance</th>
    <th>CGPA</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ student['student_id'] }}</td>
    <td>{{ student['name'] }}</td>
    <td>{{ student['department'] }}</td>
    <td>{{ student['attendance'] }}</td>
    <td>{{ student['cgpa'] }}</td>
</tr>

{% endfor %}

</table>
<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
