<!DOCTYPE html>
<html>
<head>

    <title>Student Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>
<button
    class="nav-btn"
    onclick="toggleTheme()"
>
    🌙 / ☀️
</button>
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
">

    <div class="card"
         style="
         width:450px;
         text-align:center;
         ">

        <h1 style="
        color:#d8b4fe;
        margin-bottom:30px;
        ">
            🎓 College AI ERP
        </h1>

        <h2>
            Student Login
        </h2>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <br><br>

            <button
                type="submit"
                style="width:100%;">
                Login
            </button>

        </form>

        <br>

        <a href="/faculty">
            <button style="width:100%;">
                Faculty Login
            </button>
        </a>

    </div>

</div>
<script>

function toggleTheme(){

    document.body.classList.toggle("light-mode");

}

</script>
<script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
</body>
</html>
